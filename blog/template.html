<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} – Blog Mie Ayam Pak Dul</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{{description}}">
    <meta name="author" content="Mie Ayam Pak Dul">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://mieayam.pakdul.in/blog/{{slug}}/">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="{{image}}">

    <!-- Favicons -->
    <link rel="icon" type="image/webp" href="../../assets/img/logo-nav.webp">
    <meta name="theme-color" content="#d97706">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../../tailwind.css">

    <!-- Typography -->
    <link rel="preload" href="../../assets/fonts/instrument-sans.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../../assets/fonts/playfair-display.woff2" as="font" type="font/woff2" crossorigin>

    <style>
        html { scroll-behavior: smooth; }
        .prose h1,
        .prose h2,
        .prose h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            color: #1c1917;
            scroll-margin-top: 100px;
        }

        .prose h2 {
            font-size: 1.875rem;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            border-bottom: 2px solid #f5f5f4;
            padding-bottom: 0.5rem;
        }

        .prose h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .prose p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: #44403c;
        }

        .prose ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .prose blockquote {
            border-left: 4px solid #d97706;
            padding-left: 1.5rem;
            font-style: italic;
            color: #78716c;
            margin: 2rem 0;
        }

        .prose img {
            border-radius: 1.5rem;
            margin: 2rem 0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Toc Active State */
        .toc-link.active {
            color: #d97706;
            border-left-color: #d97706;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900 selection:bg-orange-200">

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 px-6 py-4">
        <div
            class="max-w-7xl mx-auto flex items-center justify-between bg-white/70 backdrop-blur-md rounded-2xl px-6 py-3 border border-stone-200 shadow-sm">
            <a href="/" class="flex items-center gap-3">
                <img src="../../assets/img/logo-nav.webp" alt="Logo" class="w-10 h-10 object-contain">
                <span class="font-display text-xl font-bold tracking-tight">Mie Ayam Pak Dul</span>
            </a>
            <div class="hidden lg:flex items-center gap-6 font-medium text-sm text-stone-600 uppercase tracking-widest font-mono font-bold">
                <a href="/" class="hover:text-amber-600 transition-colors">Beranda</a>
                <a href="/blog/" class="hover:text-amber-600 transition-colors">Blog</a>
                <a href="/blog/" class="hover:text-amber-600 transition-colors">Category</a>
                <a href="/blog/" class="hover:text-amber-600 transition-colors">Archive</a>
            </div>
        </div>
    </nav>

    <article class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <!-- Article Header -->
            <header class="max-w-3xl mx-auto text-center mb-12">
                <div
                    class="inline-block px-3 py-1 bg-amber-100 text-amber-700 text-[10px] font-black uppercase tracking-widest rounded-full mb-6 italic">
                    {{category}}
                </div>
                <h1 class="text-4xl md:text-6xl font-display font-black leading-tight tracking-tight mb-8">
                    {{title}}
                </h1>
                <div
                    class="flex items-center justify-center gap-6 text-[10px] font-mono font-bold text-stone-400 uppercase tracking-widest">
                    <span>{{date}}</span>
                    <span class="w-1 h-1 bg-stone-300 rounded-full"></span>
                    <span>{{readingTime}}</span>
                </div>
            </header>

            <!-- Featured Image -->
            <div class="max-w-5xl mx-auto mb-16 px-4">
                <img src="{{image}}" alt="{{title}}"
                    class="w-full aspect-[21/9] object-cover rounded-[2.5rem] shadow-2xl">
            </div>

            <div class="flex flex-col lg:flex-row gap-16 relative">
                <!-- TOC Sidebar (Mobile top) -->
                <aside class="lg:hidden w-full bg-stone-100/50 rounded-3xl p-8 border border-stone-200 mb-8"
                    id="toc-mobile-container">
                    <h4 class="font-display font-bold text-lg mb-4">Daftar Isi</h4>
                    <div id="toc-mobile-content" class="space-y-2 text-sm text-stone-600">
                        <!-- ToC list here -->
                    </div>
                </aside>

                <!-- Article Content -->
                <main class="w-full lg:w-2/3 prose max-w-none px-2" id="article-content">
                    {{content}}
                </main>

                <!-- TOC Sidebar (Desktop Right) -->
                <aside class="hidden lg:block w-1/3">
                    <div class="sticky top-32 space-y-8">
                        <div class="bg-white border border-stone-200 rounded-3xl p-8 shadow-sm">
                            <h4 class="font-display font-bold text-lg mb-6 flex items-center gap-2">
                                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path d="M4 6h16M4 12h16M4 18h7" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                                Isi Artikel
                            </h4>
                            <nav id="toc-desktop"
                                class="space-y-4 text-sm font-medium text-stone-500 border-l-2 border-stone-100">
                                <!-- Generated ToC -->
                            </nav>
                        </div>

                        <!-- CTA -->
                        <div class="bg-stone-900 rounded-3xl p-8 text-white space-y-4">
                            <h4 class="text-xl font-display font-bold italic">Lagi pengen mie ayam?</h4>
                            <p class="text-stone-400 text-sm">Pesanan kamu siap meluncur. Klik tombol di bawah!</p>
                            <a href="https://wa.me/6288808620330?text=Halo+admin"
                                class="block w-full text-center py-4 bg-amber-600 text-white font-bold rounded-2xl hover:bg-amber-700 transition-all">Pesan
                                Sekarang</a>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </article>

    <footer class="bg-white py-12 border-t border-stone-200">
        <div
            class="max-w-7xl mx-auto px-6 text-center text-stone-400 text-xs font-mono font-bold uppercase tracking-widest">
            &copy; 2026 Mie Ayam Pak Dul Bumiayu.
        </div>
    </footer>

    <script>
        // Generate Table of Contents
        document.addEventListener('DOMContentLoaded', () => {
            const content = document.getElementById('article-content');
            const headings = content.querySelectorAll('h2, h3');
            const tocDesktop = document.getElementById('toc-desktop');
            const tocMobile = document.getElementById('toc-mobile-content');

            if (headings.length === 0) {
                document.querySelectorAll('aside').forEach(a => a.remove());
                return;
            }

            headings.forEach((heading, index) => {
                const id = heading.id || `heading-${index}`;
                heading.id = id;

                const link = document.createElement('a');
                link.href = `#${id}`;
                link.textContent = heading.textContent;
                link.className = `toc-link block pl-4 border-l-2 border-transparent hover:text-amber-600 transition-all ${heading.tagName === 'H3' ? 'ml-4 text-xs' : 'text-sm'}`;

                // For desktop
                tocDesktop.appendChild(link.cloneNode(true));

                // For mobile
                const mobileLink = link.cloneNode(true);
                mobileLink.className = `block hover:text-amber-600 py-1 ${heading.tagName === 'H3' ? 'ml-4' : ''}`;
                tocMobile.appendChild(mobileLink);
            });

            // Scrollspy logic
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const id = entry.target.getAttribute('id');
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                        const activeLink = document.querySelector(`.toc-link[href="#${id}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, { rootMargin: '-100px 0px -70% 0px' });

            headings.forEach(h => observer.observe(h));
        });
    </script>
</body>

</html>
